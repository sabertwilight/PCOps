---
- name: Check if Google Chrome is installed (Linux)
  ansible.builtin.stat:
    path: /usr/bin/google-chrome
  register: chrome_binary_linux
  when: ansible_system == "Linux"

- name: Check if Google Chrome is installed (macOS)
  ansible.builtin.stat:
    path: /Applications/Google Chrome.app
  register: chrome_binary_macos
  when: ansible_system == "Darwin"

- name: Get installed Chrome version (Linux)
  ansible.builtin.command: google-chrome --version
  register: chrome_version_linux
  changed_when: false
  failed_when: false
  when:
    - ansible_system == "Linux"
    - chrome_binary_linux.stat.exists

- name: Install Google Chrome (Ubuntu/Debian)
  when:
    - ansible_system == "Linux"
    - ansible_os_family == "Debian"
    - not chrome_binary_linux.stat.exists
  block:
    - name: Install dependencies
      ansible.builtin.apt:
        name:
          - gpg
          - curl
        state: present
      environment:
        http_proxy: "http://{{ google_chrome_proxy_host }}:{{ google_chrome_proxy_port }}"
        https_proxy: "http://{{ google_chrome_proxy_host }}:{{ google_chrome_proxy_port }}"

    - name: Download and dearmor Google Chrome GPG key
      ansible.builtin.shell: |
        curl -fsSL https://dl.google.com/linux/linux_signing_key.pub | gpg --dearmor -o /usr/share/keyrings/google-chrome.gpg
      args:
        creates: /usr/share/keyrings/google-chrome.gpg
      environment:
        http_proxy: "http://{{ google_chrome_proxy_host }}:{{ google_chrome_proxy_port }}"
        https_proxy: "http://{{ google_chrome_proxy_host }}:{{ google_chrome_proxy_port }}"

    - name: Set GPG key permissions
      ansible.builtin.file:
        path: /usr/share/keyrings/google-chrome.gpg
        mode: "0644"

    - name: Add Google Chrome APT repository
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] https://dl.google.com/linux/chrome/deb/ stable main"
        filename: google-chrome
        state: present
        update_cache: yes

    - name: Install Google Chrome package
      ansible.builtin.apt:
        name: google-chrome-stable
        state: present
      environment:
        http_proxy: "http://{{ google_chrome_proxy_host }}:{{ google_chrome_proxy_port }}"
        https_proxy: "http://{{ google_chrome_proxy_host }}:{{ google_chrome_proxy_port }}"

- name: Install Google Chrome (macOS)
  when:
    - ansible_system == "Darwin"
    - not chrome_binary_macos.stat.exists
  block:
    - name: Check if Homebrew is installed
      ansible.builtin.stat:
        path: /opt/homebrew/bin/brew
      register: homebrew_check

    - name: Install Google Chrome via Homebrew cask
      ansible.builtin.command:
        cmd: /opt/homebrew/bin/brew install --cask google-chrome
      environment:
        http_proxy: "http://{{ google_chrome_proxy_host }}:{{ google_chrome_proxy_port }}"
        https_proxy: "http://{{ google_chrome_proxy_host }}:{{ google_chrome_proxy_port }}"
      when: homebrew_check.stat.exists
      changed_when: true

- name: Verify Google Chrome installation (Linux)
  ansible.builtin.stat:
    path: /usr/bin/google-chrome
  register: chrome_verify_linux
  when: ansible_system == "Linux"

- name: Verify Google Chrome installation (macOS)
  ansible.builtin.stat:
    path: /Applications/Google Chrome.app
  register: chrome_verify_macos
  when: ansible_system == "Darwin"

- name: Assert Google Chrome is installed (Linux)
  ansible.builtin.assert:
    that:
      - chrome_verify_linux.stat.exists
    fail_msg: "Google Chrome binary not found at /usr/bin/google-chrome"
    success_msg: "Google Chrome installed successfully"
  when: ansible_system == "Linux"

- name: Assert Google Chrome is installed (macOS)
  ansible.builtin.assert:
    that:
      - chrome_verify_macos.stat.exists
    fail_msg: "Google Chrome.app not found in /Applications"
    success_msg: "Google Chrome installed successfully"
  when: ansible_system == "Darwin"
