---
# gtk-themes tasks
# 安装 GTK 主题和图标

- name: Install GTK theme dependencies
  apt:
    name: "{{ gtk_theme_packages }}"
    state: present
  become: true
  tags: gtk

- name: Clone GTK themes repository
  git:
    repo: "{{ gtk_themes_repo }}"
    dest: "{{ cache_dir }}/git/GTK-themes-icons"
    depth: 1
    force: true
  environment: "{{ proxy_env }}"
  tags: gtk

- name: Extract GTK themes and icons
  shell: |
    cd {{ cache_dir }}/git/GTK-themes-icons
    chmod +x auto-extract.sh
    ./auto-extract.sh
  args:
    creates: "{{ target_user_home }}/.themes/Andromeda-dark"
  tags: gtk

- name: Ensure ~/.icons directory exists
  file:
    path: "{{ target_user_home }}/.icons/default"
    state: directory
    mode: "0755"
  tags: gtk

- name: Create cursor theme index to prevent circular Inherits
  copy:
    dest: "{{ target_user_home }}/.icons/default/index.theme"
    content: |
      [Icon Theme]
      Name=Default
      Comment=Default Cursor Theme
      Inherits={{ cursor_theme_name }}
    mode: "0644"
  tags: gtk

- name: Set cursor theme in gsettings
  dconf:
    key: "/org/gnome/desktop/interface/cursor-theme"
    value: "'{{ cursor_theme_name }}'"
  tags: gtk
