---
- name: Check if Dida is installed (Linux)
  ansible.builtin.stat:
    path: /usr/bin/dida
  register: dida_binary_linux
  when: ansible_system == "Linux"

- name: Check if Dida is installed (macOS)
  ansible.builtin.stat:
    path: /Applications/Dida.app
  register: dida_binary_macos
  when: ansible_system == "Darwin"

- name: Set proxy environment
  set_fact:
    dida_proxy_env:
      http_proxy: "{{ proxy_http }}"
      https_proxy: "{{ proxy_https }}"
  when: configure_proxy | default(false)

- name: Install Dida (Ubuntu/Debian)
  when:
    - ansible_system == "Linux"
    - ansible_os_family == "Debian"
    - not dida_binary_linux.stat.exists
  block:
    - name: Detect system architecture
      ansible.builtin.set_fact:
        dida_arch: "{{ 'arm64' if ansible_architecture == 'aarch64' else 'x64' }}"

    - name: Download Dida deb package
      ansible.builtin.command:
        cmd: curl -fsSL -A "Mozilla/5.0 (X11; Linux x86_64)" -o /tmp/dida.deb "https://dida365.com/static/getApp/download?type=linux_deb_{{ dida_arch }}"
      environment: "{{ dida_proxy_env | default({}) }}"
      changed_when: true

    - name: Install Dida deb package
      ansible.builtin.apt:
        deb: /tmp/dida.deb
        state: present
      become: true
      environment: "{{ dida_proxy_env | default({}) }}"

    - name: Clean up deb package
      ansible.builtin.file:
        path: /tmp/dida.deb
        state: absent
      become: true

- name: Install Dida (macOS)
  when:
    - ansible_system == "Darwin"
    - not dida_binary_macos.stat.exists
  block:
    - name: Check if Homebrew is installed
      ansible.builtin.stat:
        path: /opt/homebrew/bin/brew
      register: homebrew_check

    - name: Install Dida via Homebrew cask
      ansible.builtin.command:
        cmd: /opt/homebrew/bin/brew install --cask ticktick
      environment: "{{ dida_proxy_env | default({}) }}"
      when: homebrew_check.stat.exists
      changed_when: true

- name: Verify Dida installation (Linux)
  ansible.builtin.stat:
    path: /usr/bin/dida
  register: dida_verify_linux
  when: ansible_system == "Linux"

- name: Verify Dida installation (macOS)
  ansible.builtin.stat:
    path: /Applications/Dida.app
  register: dida_verify_macos
  when: ansible_system == "Darwin"

- name: Assert Dida is installed (Linux)
  ansible.builtin.assert:
    that:
      - dida_verify_linux.stat.exists
    fail_msg: "Dida binary not found at /usr/bin/dida"
    success_msg: "Dida installed successfully"
  when: ansible_system == "Linux"

- name: Assert Dida is installed (macOS)
  ansible.builtin.assert:
    that:
      - dida_verify_macos.stat.exists
    fail_msg: "Dida.app not found in /Applications"
    success_msg: "Dida installed successfully"
  when: ansible_system == "Darwin"
