---
- name: Check if DBeaver is installed (Linux)
  ansible.builtin.stat:
    path: /usr/bin/dbeaver
  register: dbeaver_binary_linux
  when: ansible_system == "Linux"

- name: Check if DBeaver is installed (macOS)
  ansible.builtin.stat:
    path: /Applications/DBeaver.app
  register: dbeaver_binary_macos
  when: ansible_system == "Darwin"

- name: Set proxy environment
  set_fact:
    dbeaver_proxy_env:
      http_proxy: "{{ proxy_http }}"
      https_proxy: "{{ proxy_https }}"
  when: configure_proxy | default(false)

- name: Install DBeaver (Ubuntu/Debian)
  when:
    - ansible_system == "Linux"
    - ansible_os_family == "Debian"
    - not dbeaver_binary_linux.stat.exists
  block:
    - name: Download DBeaver deb package
      ansible.builtin.command:
        cmd: curl -fsSL https://dbeaver.io/files/dbeaver-ce_latest_amd64.deb -o /tmp/dbeaver.deb
      environment: "{{ dbeaver_proxy_env | default({}) }}"
      changed_when: true

    - name: Install DBeaver deb package
      ansible.builtin.apt:
        deb: /tmp/dbeaver.deb
        state: present
      become: true
      environment: "{{ dbeaver_proxy_env | default({}) }}"

    - name: Clean up deb package
      ansible.builtin.file:
        path: /tmp/dbeaver.deb
        state: absent

- name: Install DBeaver (macOS)
  when:
    - ansible_system == "Darwin"
    - not dbeaver_binary_macos.stat.exists
  block:
    - name: Check if Homebrew is installed
      ansible.builtin.stat:
        path: /opt/homebrew/bin/brew
      register: homebrew_check

    - name: Install DBeaver via Homebrew cask
      ansible.builtin.command:
        cmd: /opt/homebrew/bin/brew install --cask dbeaver-community
      environment: "{{ dbeaver_proxy_env | default({}) }}"
      when: homebrew_check.stat.exists
      changed_when: true

- name: Verify DBeaver installation (Linux)
  ansible.builtin.stat:
    path: /usr/bin/dbeaver
  register: dbeaver_verify_linux
  when: ansible_system == "Linux"

- name: Verify DBeaver installation (macOS)
  ansible.builtin.stat:
    path: /Applications/DBeaver.app
  register: dbeaver_verify_macos
  when: ansible_system == "Darwin"

- name: Assert DBeaver is installed (Linux)
  ansible.builtin.assert:
    that:
      - dbeaver_verify_linux.stat.exists
    fail_msg: "DBeaver binary not found at /usr/bin/dbeaver"
    success_msg: "DBeaver installed successfully"
  when: ansible_system == "Linux"

- name: Assert DBeaver is installed (macOS)
  ansible.builtin.assert:
    that:
      - dbeaver_verify_macos.stat.exists
    fail_msg: "DBeaver.app not found in /Applications"
    success_msg: "DBeaver installed successfully"
  when: ansible_system == "Darwin"
