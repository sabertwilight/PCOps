---
- name: Verify
  hosts: all
  gather_facts: true
  tasks:
    - name: Check DBeaver binary exists (Linux)
      ansible.builtin.stat:
        path: /usr/bin/dbeaver
      register: dbeaver_binary
      when: ansible_system == "Linux"

    - name: Assert DBeaver binary exists (Linux)
      ansible.builtin.assert:
        that:
          - dbeaver_binary.stat.exists
        fail_msg: "DBeaver binary not found at /usr/bin/dbeaver"
        success_msg: "DBeaver binary exists"
      when: ansible_system == "Linux"
