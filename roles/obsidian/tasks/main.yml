---
- name: Check if Obsidian is installed (Linux)
  ansible.builtin.stat:
    path: /usr/bin/obsidian
  register: obsidian_binary_linux
  when: ansible_system == "Linux"

- name: Check if Obsidian is installed (macOS)
  ansible.builtin.stat:
    path: /Applications/Obsidian.app
  register: obsidian_binary_macos
  when: ansible_system == "Darwin"

- name: Install Obsidian (Ubuntu/Debian)
  when:
    - ansible_system == "Linux"
    - ansible_os_family == "Debian"
    - not obsidian_binary_linux.stat.exists
  block:
    - name: Download Obsidian deb package
      ansible.builtin.command:
        cmd: curl -fsSL https://github.com/obsidianmd/obsidian-releases/releases/latest/download/obsidian_{{ obsidian_version }}_amd64.deb -o /tmp/obsidian.deb
      environment:
        http_proxy: "http://{{ obsidian_proxy_host }}:{{ obsidian_proxy_port }}"
        https_proxy: "http://{{ obsidian_proxy_host }}:{{ obsidian_proxy_port }}"
      changed_when: true

    - name: Install Obsidian deb package
      ansible.builtin.apt:
        deb: /tmp/obsidian.deb
        state: present
      environment:
        http_proxy: "http://{{ obsidian_proxy_host }}:{{ obsidian_proxy_port }}"
        https_proxy: "http://{{ obsidian_proxy_host }}:{{ obsidian_proxy_port }}"

    - name: Clean up deb package
      ansible.builtin.file:
        path: /tmp/obsidian.deb
        state: absent

- name: Install Obsidian (macOS)
  when:
    - ansible_system == "Darwin"
    - not obsidian_binary_macos.stat.exists
  block:
    - name: Check if Homebrew is installed
      ansible.builtin.stat:
        path: /opt/homebrew/bin/brew
      register: homebrew_check

    - name: Install Obsidian via Homebrew cask
      ansible.builtin.command:
        cmd: /opt/homebrew/bin/brew install --cask obsidian
      environment:
        http_proxy: "http://{{ obsidian_proxy_host }}:{{ obsidian_proxy_port }}"
        https_proxy: "http://{{ obsidian_proxy_host }}:{{ obsidian_proxy_port }}"
      when: homebrew_check.stat.exists
      changed_when: true

- name: Verify Obsidian installation (Linux)
  ansible.builtin.stat:
    path: /usr/bin/obsidian
  register: obsidian_verify_linux
  when: ansible_system == "Linux"

- name: Verify Obsidian installation (macOS)
  ansible.builtin.stat:
    path: /Applications/Obsidian.app
  register: obsidian_verify_macos
  when: ansible_system == "Darwin"

- name: Assert Obsidian is installed (Linux)
  ansible.builtin.assert:
    that:
      - obsidian_verify_linux.stat.exists
    fail_msg: "Obsidian binary not found at /usr/bin/obsidian"
    success_msg: "Obsidian installed successfully"
  when: ansible_system == "Linux"

- name: Assert Obsidian is installed (macOS)
  ansible.builtin.assert:
    that:
      - obsidian_verify_macos.stat.exists
    fail_msg: "Obsidian.app not found in /Applications"
    success_msg: "Obsidian installed successfully"
  when: ansible_system == "Darwin"
