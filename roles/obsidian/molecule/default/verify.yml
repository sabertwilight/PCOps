---
- name: Verify
  hosts: all
  gather_facts: true
  tasks:
    - name: Check Obsidian binary exists (Linux)
      ansible.builtin.stat:
        path: /usr/bin/obsidian
      register: obsidian_binary
      when: ansible_system == "Linux"

    - name: Assert Obsidian binary exists (Linux)
      ansible.builtin.assert:
        that:
          - obsidian_binary.stat.exists
        fail_msg: "Obsidian binary not found at /usr/bin/obsidian"
        success_msg: "Obsidian binary exists"
      when: ansible_system == "Linux"
