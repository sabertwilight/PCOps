---
- name: Check if Cherry Studio is installed (Linux)
  ansible.builtin.stat:
    path: /usr/bin/CherryStudio
  register: cherrystudio_binary_linux
  when: ansible_system == "Linux"

- name: Check if Cherry Studio is installed (macOS)
  ansible.builtin.stat:
    path: /Applications/Cherry Studio.app
  register: cherrystudio_binary_macos
  when: ansible_system == "Darwin"

- name: Install Cherry Studio (Ubuntu/Debian)
  when:
    - ansible_system == "Linux"
    - ansible_os_family == "Debian"
    - not cherrystudio_binary_linux.stat.exists
  block:
    - name: Detect system architecture
      ansible.builtin.set_fact:
        cherrystudio_arch: "{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}"

    - name: Download Cherry Studio deb package
      ansible.builtin.command:
        cmd: curl -fsSL https://github.com/CherryHQ/cherry-studio/releases/download/v{{ cherrystudio_version }}/Cherry-Studio-{{ cherrystudio_version }}-{{ cherrystudio_arch }}.deb -o /tmp/cherry-studio.deb
      environment:
        http_proxy: "http://{{ cherrystudio_proxy_host }}:{{ cherrystudio_proxy_port }}"
        https_proxy: "http://{{ cherrystudio_proxy_host }}:{{ cherrystudio_proxy_port }}"
      changed_when: true

    - name: Install Cherry Studio deb package
      ansible.builtin.apt:
        deb: /tmp/cherry-studio.deb
        state: present
      environment:
        http_proxy: "http://{{ cherrystudio_proxy_host }}:{{ cherrystudio_proxy_port }}"
        https_proxy: "http://{{ cherrystudio_proxy_host }}:{{ cherrystudio_proxy_port }}"

    - name: Clean up deb package
      ansible.builtin.file:
        path: /tmp/cherry-studio.deb
        state: absent

- name: Install Cherry Studio (macOS)
  when:
    - ansible_system == "Darwin"
    - not cherrystudio_binary_macos.stat.exists
  block:
    - name: Check if Homebrew is installed
      ansible.builtin.stat:
        path: /opt/homebrew/bin/brew
      register: homebrew_check

    - name: Install Cherry Studio via Homebrew cask
      ansible.builtin.command:
        cmd: /opt/homebrew/bin/brew install --cask cherry-studio
      environment:
        http_proxy: "http://{{ cherrystudio_proxy_host }}:{{ cherrystudio_proxy_port }}"
        https_proxy: "http://{{ cherrystudio_proxy_host }}:{{ cherrystudio_proxy_port }}"
      when: homebrew_check.stat.exists
      changed_when: true

- name: Verify Cherry Studio installation (Linux)
  ansible.builtin.stat:
    path: /usr/bin/CherryStudio
  register: cherrystudio_verify_linux
  when: ansible_system == "Linux"

- name: Verify Cherry Studio installation (macOS)
  ansible.builtin.stat:
    path: /Applications/Cherry Studio.app
  register: cherrystudio_verify_macos
  when: ansible_system == "Darwin"

- name: Assert Cherry Studio is installed (Linux)
  ansible.builtin.assert:
    that:
      - cherrystudio_verify_linux.stat.exists
    fail_msg: "Cherry Studio binary not found at /usr/bin/CherryStudio"
    success_msg: "Cherry Studio installed successfully"
  when: ansible_system == "Linux"

- name: Assert Cherry Studio is installed (macOS)
  ansible.builtin.assert:
    that:
      - cherrystudio_verify_macos.stat.exists
    fail_msg: "Cherry Studio.app not found in /Applications"
    success_msg: "Cherry Studio installed successfully"
  when: ansible_system == "Darwin"
