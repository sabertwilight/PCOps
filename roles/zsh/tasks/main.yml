---
# zsh tasks
# 安装 Zsh, Oh-My-Zsh, 插件和 Pokemon 彩色脚本

- name: Install Zsh packages
  apt:
    name: "{{ zsh_packages }}"
    state: present
  become: true
  tags: zsh

- name: Install Oh My Zsh
  shell: sh -c "$(curl -fsSL https://install.ohmyz.sh)" "" --unattended
  args:
    creates: "{{ target_user_home }}/.oh-my-zsh"
  environment: "{{ proxy_env }}"
  tags: zsh

- name: Install Zsh plugins
  git:
    repo: "{{ item.repo }}"
    dest: "{{ target_user_home }}/.oh-my-zsh/custom/plugins/{{ item.name }}"
    depth: 1
  environment: "{{ proxy_env }}"
  loop: "{{ zsh_plugins }}"
  tags: zsh

- name: Backup existing .zshrc
  copy:
    src: "{{ target_user_home }}/.zshrc"
    dest: "{{ target_user_home }}/.zshrc-backup"
    remote_src: true
  when: ansible_env.HOME + '/.zshrc' is exists
  tags: zsh

- name: Backup existing .zprofile
  copy:
    src: "{{ target_user_home }}/.zprofile"
    dest: "{{ target_user_home }}/.zprofile-backup"
    remote_src: true
  when: ansible_env.HOME + '/.zprofile' is exists
  tags: zsh

- name: Copy Zsh configuration
  copy:
    src: "assets/.zshrc"
    dest: "{{ target_user_home }}/.zshrc"
    mode: '0644'
  tags: zsh

- name: Copy Zsh profile
  copy:
    src: "assets/.zprofile"
    dest: "{{ target_user_home }}/.zprofile"
    mode: '0644'
  tags: zsh

- name: Copy additional Zsh themes
  copy:
    src: "assets/add_zsh_theme/"
    dest: "{{ target_user_home }}/.oh-my-zsh/themes/"
    mode: '0644'
  tags: zsh

- name: Change default shell to Zsh
  user:
    name: "{{ target_user }}"
    shell: /usr/bin/zsh
  become: true
  tags: zsh

# Fastfetch 安装
- name: Get latest fastfetch release URL
  shell: |
    curl -s https://api.github.com/repos/fastfetch-cli/fastfetch/releases/latest \
    | grep "browser_download_url.*fastfetch-linux-amd64.deb" \
    | cut -d '"' -f 4
  environment: "{{ proxy_env }}"
  register: fastfetch_url
  changed_when: false
  tags: zsh

- name: Download fastfetch
  get_url:
    url: "{{ fastfetch_url.stdout }}"
    dest: "/tmp/fastfetch-linux-amd64.deb"
    mode: '0644'
  environment: "{{ proxy_env }}"
  when: fastfetch_url.stdout | length > 0
  tags: zsh

- name: Install fastfetch
  apt:
    deb: "/tmp/fastfetch-linux-amd64.deb"
    state: present
  become: true
  when: fastfetch_url.stdout | length > 0
  tags: zsh

- name: Copy fastfetch config
  copy:
    src: "assets/fastfetch/"
    dest: "{{ target_user_home }}/.config/fastfetch/"
    mode: 'preserve'
  tags: zsh

# Pokemon color scripts
- name: Clone Pokemon color scripts
  git:
    repo: "{{ pokemon_colorscripts_repo }}"
    dest: "{{ cache_dir }}/git/pokemon-colorscripts"
    depth: 1
    force: true
  environment: "{{ proxy_env }}"
  when: install_pokemon_scripts
  tags: [zsh, pokemon]

- name: Install Pokemon color scripts
  shell: |
    cd {{ cache_dir }}/git/pokemon-colorscripts
    ./install.sh
  args:
    creates: /usr/local/bin/pokemon-colorscripts
  become: true
  when: install_pokemon_scripts
  tags: [zsh, pokemon]

- name: Enable Pokemon color scripts in .zshrc
  lineinfile:
    path: "{{ target_user_home }}/.zshrc"
    regexp: '^#pokemon-colorscripts'
    line: 'pokemon-colorscripts --no-title -s -r | fastfetch -c $HOME/.config/fastfetch/config-pokemon.jsonc --logo-type file-raw --logo-height 10 --logo-width 5 --logo'
    state: present
  when: install_pokemon_scripts
  tags: [zsh, pokemon]
