---
# 03-fonts tasks
# 安装字体 (apt + 下载 Nerd 字体)

- name: Install font packages via apt
  apt:
    name: "{{ font_packages }}"
    state: present
  become: true
  tags: fonts

- name: Ensure cache directory for fonts exists
  file:
    path: "{{ cache_dir }}/fonts"
    state: directory
    mode: '0755'
  when: use_cache
  tags: fonts

- name: Download and extract Nerd fonts
  block:
    - name: Check if font is already installed
      find:
        paths: "{{ item.dest }}"
        patterns: ["*.ttf", "*.otf"]
      register: font_dir_stat
      loop: "{{ nerd_fonts }}"

    - name: Download font to cache
      get_url:
        url: "{{ item.url }}"
        dest: "{{ cache_dir }}/fonts/{{ item.filename }}"
        mode: '0644'
      environment: "{{ proxy_env }}"
      when:
        - use_cache
        - font_dir_stat.results[index].matched == 0 or not offline_mode
      loop: "{{ nerd_fonts }}"
      loop_control:
        index_var: index
      register: font_downloads

    - name: Extract font archives
      unarchive:
        src: "{{ cache_dir }}/fonts/{{ item.filename }}"
        dest: "{{ item.dest }}"
        remote_src: true
      when: >
        use_cache and
        font_dir_stat.results[nerd_fonts.index(item)].matched == 0
      loop: "{{ nerd_fonts }}"
  tags: fonts

- name: Update font cache
  command: fc-cache -fv
  changed_when: true
  tags: fonts
