---
- name: Check if WeChat is installed (Linux)
  ansible.builtin.stat:
    path: /usr/bin/weixin
  register: wechat_binary_linux
  when: ansible_system == "Linux"

- name: Set proxy environment
  set_fact:
    wechat_proxy_env:
      http_proxy: "{{ proxy_http }}"
      https_proxy: "{{ proxy_https }}"
  when: configure_proxy | default(false)

- name: Install WeChat (Ubuntu/Debian)
  when:
    - ansible_system == "Linux"
    - ansible_os_family == "Debian"
    - not wechat_binary_linux.stat.exists
  block:
    - name: Download WeChat deb package
      ansible.builtin.command:
        cmd: curl -fsSL https://dldir1v6.qq.com/weixin/Universal/Linux/WeChatLinux_x86_64.deb -o /tmp/wechat.deb
      environment: "{{ wechat_proxy_env | default({}) }}"
      changed_when: true

    - name: Install WeChat deb package
      ansible.builtin.apt:
        deb: /tmp/wechat.deb
        state: present
      become: true
      environment: "{{ wechat_proxy_env | default({}) }}"

    - name: Clean up deb package
      ansible.builtin.file:
        path: /tmp/wechat.deb
        state: absent

- name: Verify WeChat installation (Linux)
  ansible.builtin.stat:
    path: /usr/bin/wechat
  register: wechat_verify_linux
  when: ansible_system == "Linux"

- name: Assert WeChat is installed (Linux)
  ansible.builtin.assert:
    that:
      - wechat_verify_linux.stat.exists
    fail_msg: "WeChat binary not found at /usr/bin/wechat"
    success_msg: "WeChat installed successfully"
  when: ansible_system == "Linux"
