---
- name: Check if Microsoft Edge is installed (Linux)
  ansible.builtin.stat:
    path: /usr/bin/microsoft-edge
  register: edge_binary_linux
  when: ansible_system == "Linux"

- name: Check if Microsoft Edge is installed (macOS)
  ansible.builtin.stat:
    path: /Applications/Microsoft Edge.app
  register: edge_binary_macos
  when: ansible_system == "Darwin"

- name: Get installed Edge version (Linux)
  ansible.builtin.command: microsoft-edge --version
  register: edge_version_linux
  changed_when: false
  failed_when: false
  when:
    - ansible_system == "Linux"
    - edge_binary_linux.stat.exists

- name: Install Microsoft Edge (Ubuntu/Debian)
  when:
    - ansible_system == "Linux"
    - ansible_os_family == "Debian"
    - not edge_binary_linux.stat.exists
  block:
    - name: Install dependencies
      ansible.builtin.apt:
        name:
          - gpg
          - curl
        state: present
      environment:
        http_proxy: "http://{{ microsoft_edge_proxy_host }}:{{ microsoft_edge_proxy_port }}"
        https_proxy: "http://{{ microsoft_edge_proxy_host }}:{{ microsoft_edge_proxy_port }}"

    - name: Download and dearmor Microsoft GPG key
      ansible.builtin.shell: |
        curl -fsSL https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor -o /usr/share/keyrings/microsoft-edge.gpg
      args:
        creates: /usr/share/keyrings/microsoft-edge.gpg
      environment:
        http_proxy: "http://{{ microsoft_edge_proxy_host }}:{{ microsoft_edge_proxy_port }}"
        https_proxy: "http://{{ microsoft_edge_proxy_host }}:{{ microsoft_edge_proxy_port }}"

    - name: Set GPG key permissions
      ansible.builtin.file:
        path: /usr/share/keyrings/microsoft-edge.gpg
        mode: "0644"

    - name: Add Microsoft Edge APT repository
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft-edge.gpg] https://packages.microsoft.com/repos/edge stable main"
        filename: microsoft-edge
        state: present
        update_cache: yes

    - name: Install Microsoft Edge package
      ansible.builtin.apt:
        name: microsoft-edge-stable
        state: present
      environment:
        http_proxy: "http://{{ microsoft_edge_proxy_host }}:{{ microsoft_edge_proxy_port }}"
        https_proxy: "http://{{ microsoft_edge_proxy_host }}:{{ microsoft_edge_proxy_port }}"

- name: Install Microsoft Edge (macOS)
  when:
    - ansible_system == "Darwin"
    - not edge_binary_macos.stat.exists
  block:
    - name: Check if Homebrew is installed
      ansible.builtin.stat:
        path: /opt/homebrew/bin/brew
      register: homebrew_check

    - name: Install Microsoft Edge via Homebrew cask
      ansible.builtin.command:
        cmd: /opt/homebrew/bin/brew install --cask microsoft-edge
      environment:
        http_proxy: "http://{{ microsoft_edge_proxy_host }}:{{ microsoft_edge_proxy_port }}"
        https_proxy: "http://{{ microsoft_edge_proxy_host }}:{{ microsoft_edge_proxy_port }}"
      when: homebrew_check.stat.exists
      changed_when: true

- name: Verify Microsoft Edge installation (Linux)
  ansible.builtin.stat:
    path: /usr/bin/microsoft-edge
  register: edge_verify_linux
  when: ansible_system == "Linux"

- name: Verify Microsoft Edge installation (macOS)
  ansible.builtin.stat:
    path: /Applications/Microsoft Edge.app
  register: edge_verify_macos
  when: ansible_system == "Darwin"

- name: Assert Microsoft Edge is installed (Linux)
  ansible.builtin.assert:
    that:
      - edge_verify_linux.stat.exists
    fail_msg: "Microsoft Edge binary not found at /usr/bin/microsoft-edge"
    success_msg: "Microsoft Edge installed successfully"
  when: ansible_system == "Linux"

- name: Assert Microsoft Edge is installed (macOS)
  ansible.builtin.assert:
    that:
      - edge_verify_macos.stat.exists
    fail_msg: "Microsoft Edge.app not found in /Applications"
    success_msg: "Microsoft Edge installed successfully"
  when: ansible_system == "Darwin"
