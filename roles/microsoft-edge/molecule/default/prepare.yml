---
- name: Prepare
  hosts: all
  gather_facts: true
  tasks:
    - name: Install curl and dependencies (Debian/Ubuntu)
      ansible.builtin.apt:
        name:
          - curl
          - ca-certificates
          - libasound2t64
          - libatk-bridge2.0-0
          - libatk1.0-0
          - libcups2
          - libdbus-1-3
          - libdrm2
          - libgbm1
          - libgtk-3-0
          - libnspr4
          - libnss3
          - libxcomposite1
          - libxdamage1
          - libxfixes3
          - libxkbcommon0
          - libxrandr2
          - xdg-utils
        state: present
        update_cache: true
      when: ansible_os_family == "Debian"
