# ===========================================
# rofi-wayland (meson)
# ===========================================
- name: Check if rofi is installed
  stat:
    path: /usr/local/bin/rofi
  register: rofi_installed
  tags: [build-tools, rofi]

- name: Download rofi-wayland source
  get_url:
    url: "https://github.com/lbonn/rofi/releases/download/{{ rofi_wayland_version }}/rofi-{{ rofi_wayland_version }}.tar.xz"
    dest: "{{ cache_dir }}/archives/rofi-{{ rofi_wayland_version }}.tar.xz"
    mode: '0644'
  environment: "{{ proxy_env }}"
  when: use_cache and not rofi_installed.stat.exists
  tags: [build-tools, rofi]

- name: Extract rofi-wayland source
  unarchive:
    src: "{{ cache_dir }}/archives/rofi-{{ rofi_wayland_version }}.tar.xz"
    dest: "{{ build_dir }}"
    remote_src: true
  when: not rofi_installed.stat.exists
  tags: [build-tools, rofi]

- name: Build and install rofi-wayland
  shell: |
    cd {{ build_dir }}/rofi-{{ rofi_wayland_version }}
    meson setup build --prefix=/usr/local
    ninja -C build
    ninja -C build install
  args:
    creates: /usr/local/bin/rofi
  become: true
  when: not rofi_installed.stat.exists
  tags: [build-tools, rofi]

