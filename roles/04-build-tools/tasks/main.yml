---
# 04-build-tools tasks
# 从源码编译安装 wallust, swww, rofi-wayland, swappy, nwg-look, nwg-displays

- name: Install build tool dependencies
  apt:
    name: "{{ build_tool_dependencies }}"
    state: present
  become: true
  tags: build-tools

# ===========================================
# wallust (cargo)
# ===========================================
- name: Clone wallust repository
  git:
    repo: "{{ wallust_repo }}"
    dest: "{{ cache_dir }}/git/wallust"
    version: "{{ wallust_version }}"
    depth: 1
    force: true
  environment: "{{ proxy_env }}"
  tags: [build-tools, wallust]

- name: Check if wallust is installed
  stat:
    path: "{{ target_user_home }}/.cargo/bin/wallust"
  register: wallust_installed
  tags: [build-tools, wallust]

- name: Build and install wallust
  shell: |
    source {{ target_user_home }}/.cargo/env
    cd {{ cache_dir }}/git/wallust
    cargo build --release
    cargo install --path . --force
  args:
    executable: /bin/bash
  environment: "{{ proxy_env }}"
  when: not wallust_installed.stat.exists
  tags: [build-tools, wallust]

# ===========================================
# swww (cargo)
# ===========================================
- name: Clone swww repository
  git:
    repo: "{{ swww_repo }}"
    dest: "{{ cache_dir }}/git/swww"
    version: "{{ swww_version }}"
