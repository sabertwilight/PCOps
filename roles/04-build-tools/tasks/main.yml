# ===========================================
# nwg-look (make)
# ===========================================
- name: Clone nwg-look repository
  git:
    repo: "{{ nwg_look_repo }}"
    dest: "{{ cache_dir }}/git/nwg-look"
    version: "{{ nwg_look_version }}"
    depth: 1
    force: true
  environment: "{{ proxy_env }}"
  when: install_nwg_look
  tags: [build-tools, nwg-look]

- name: Check if nwg-look is installed
  stat:
    path: /usr/local/bin/nwg-look
  register: nwg_look_installed
  when: install_nwg_look
  tags: [build-tools, nwg-look]

- name: Build and install nwg-look
  shell: |
    source {{ target_user_home }}/.cargo/env
    cd {{ cache_dir }}/git/nwg-look
    make
    make install
  args:
    executable: /bin/bash
    creates: /usr/local/bin/nwg-look
  environment: "{{ proxy_env }}"
  become: true
  when:
    - install_nwg_look
    - not nwg_look_installed.stat.exists
  tags: [build-tools, nwg-look]

# ===========================================
# nwg-displays (shell installer)
# ===========================================
- name: Clone nwg-displays repository
  git:
    repo: "{{ nwg_displays_repo }}"
    dest: "{{ cache_dir }}/git/nwg-displays"
    version: "{{ nwg_displays_version }}"
    depth: 1
    force: true
  environment: "{{ proxy_env }}"
  tags: [build-tools, nwg-displays]

- name: Check if nwg-displays is installed
  stat:
    path: /usr/local/bin/nwg-displays
  register: nwg_displays_installed
  tags: [build-tools, nwg-displays]

- name: Install nwg-displays
  shell: |
    cd {{ cache_dir }}/git/nwg-displays
    ./install.sh
  args:
    creates: /usr/local/bin/nwg-displays
  become: true
  when: not nwg_displays_installed.stat.exists
  tags: [build-tools, nwg-displays]
