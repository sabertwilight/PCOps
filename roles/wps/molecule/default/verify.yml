---
- name: Verify
  hosts: all
  gather_facts: true
  tasks:
    - name: Check WPS Office binary exists (Linux)
      ansible.builtin.stat:
        path: /usr/bin/wps
      register: wps_binary
      when: ansible_system == "Linux"

    - name: Assert WPS Office binary exists (Linux)
      ansible.builtin.assert:
        that:
          - wps_binary.stat.exists
        fail_msg: "WPS Office binary not found at /usr/bin/wps"
        success_msg: "WPS Office binary exists"
      when: ansible_system == "Linux"
