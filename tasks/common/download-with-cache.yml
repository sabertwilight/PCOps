---
# Common tasks for downloading with cache support

- name: Ensure cache directory exists
  file:
    path: "{{ cache_dir }}/{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - fonts
    - git
    - archives
  when: use_cache

- name: Download file with cache
  block:
    - name: Check if file exists in cache
      stat:
        path: "{{ cache_dir }}/archives/{{ filename }}"
      register: cache_file

    - name: Download to cache
      get_url:
        url: "{{ url }}"
        dest: "{{ cache_dir }}/archives/{{ filename }}"
        mode: '0644'
      when: >
        use_cache and
        (not cache_file.stat.exists or not offline_mode)

    - name: Use cached file
      set_fact:
        cached_file_path: "{{ cache_dir }}/archives/{{ filename }}"
  when: use_cache
